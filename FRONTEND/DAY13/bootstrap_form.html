<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <h1>Registration form !</h1>

    <div class="card p-5 bg-secondary">
        <form action="">
            <label for="" class="form-label">Name</label>

            <input type="text" name="name" class="form-control" placeholder="Enter YOur Name" value="" />

            <label for="" class="form-label">Email</label>
            <input type="email" name="email" id="" class="form-control" value="abc@gmail.com" />

            <label for="" class="form-label">Mobile Number</label>
            <input type="number" name="mobile" id="" class="form-control" />

            <label for="" class="form-label">D.O.B</label>
            <input type="date" name="dob" id="" class="form-control" />

            <label for="">Gender: </label>
            <br />

            <input type="radio" name="gender" />
            <label for="">Male</label>

            <input type="radio" name="gender" />
            <label for="">Female</label>

            <input type="radio" name="gender" />
            <label for="">Other</label>

            <br />
            <label for="" class="form-label">Upload Your Document : </label>
            <input type="file" name="document" id="" class="form-control" />

            <br />
            <br />
            <select class="form-select">
                <option selected>Open this select menu</option>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
            </select>
            <br />
            <br />

            <label for="" class="form-label">Read only Label</label>
            <input type="text" name="" id="" class="form-control" readonly />

            <br />
            <br />
            <select class="form-select" disabled>
                <option selected>Open this select menu</option>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
            </select>
            <br />
            <br />

            <div class="form-check">
                <input class="form-check-input" type="checkbox" checked />
                <label class="form-label">
                    I agree that all the details filled in this form are correct and
                    true.
                </label>
            </div>

            <br />
            <br />

            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" />
                <label class="form-check-label">Default switch checkbox input</label>
            </div>

            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" checked />
                <label class="form-check-label" for="switchCheckChecked">Checked switch checkbox input</label>
            </div>

            <br />
            <br />

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" />
                <label class="form-label"> First </label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" />
                <label class="form-label"> Second </label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" />
                <label class="form-label"> Third </label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" />
                <label class="form-label"> Fourth </label>
            </div>

            <br />
            <br />

            <label class="form-label">Example range</label>
            <input type="range" class="form-range" />

            <br />
            <br />

            <div class="input-group">
                <span class="input-group-text"><img src="../images/user.png" style="height: 30px" alt="" /></span>
                <input type="text" class="form-control" placeholder="Enter Your Username" />
            </div>

            <br />
            <br />
            <div class="form-floating ">
                <input type="text" name="name" class="form-control" placeholder="Enter YOur Name" value="" />
                <label for="" class="form-label">Floating Name </label>
            </div>

            <br />
            <br />


            <center><button class="btn btn-primary">Submit</button></center>
        </form>
    </div>
</body>

</html>

<!-- in input tag , name attribute (name="") is used for backend purpose  -->


<!-- NOte:  in frontend we have to focus only class and type in any form tag.  -->
