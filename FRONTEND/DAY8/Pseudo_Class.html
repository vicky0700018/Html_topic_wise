<!-- DAY 8
What is a Pseudo-Class?
Definition
A pseudo-class is used to define a special state of an element.

Example:
:hover
:nth-child()

:hover and :nth-child() -->
<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Pseudo Class Example</title>

    <style>
        p {
            border: 2px solid maroon;
            height: 200px;
            width: 200px;
            text-align: center;
            background-color: black;
            color: whitesmoke;
            font-size: 20px;
        }

        /* Hover effect */
        p:hover {
            background-color: yellow;
            color: maroon;
        }

        /* Select third child */
        p:nth-child(3) {
            background-color: goldenrod;
            color: black;
        }

        /* First child hover */
        p:nth-child(1):hover {
            background-color: green;
        }
    </style>
</head>

<body>
    <p>First box</p>
    <p>Second box</p>
    <p>Third box</p>
    <p>Fourth box</p>
    <p>Fifth box</p>
</body>

</html>


<!-- What is a Pseudo-Element?
Definition
Pseudo-elements are used to style specific parts of an element.

Example:
::before
::after -->

::before
<!DOCTYPE html>
<html>

<head>
    <title>Pseudo Element</title>

    <style>
        /* Before text */
        p::before {
            content: "👉 ";
            color: red;
            font-weight: bold;
        }

        /* After text */
        p::after {
            content: " 👈";
            color: blue;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <p>Hello World</p>
</body>

</html>
<!-- 



What is Position in CSS?
Definition
The position property specifies how an element
is positioned in a webpage.

Types of Position
1. static  (Default)
2. relative
3. absolute
4. fixed
5. Sticky -->




<!-- 
position: static (Default)
Definition
-> Static is the default position.
->Elements follow normal document flow.
->Top, left, right, bottom do NOT work.
Example -->
<!DOCTYPE html>
<html>

<head>
    <style>
        .box {
            position: static;
            background: lightblue;
            top: 50px;
            /* This will NOT work */
        }
    </style>
</head>

<body>

    <div class="box">Static Box</div>

</body>

</html>

<!-- 📌 It behaves normally. No movement.

position: relative
Definition
-> Moves element relative to its original position.
-> Top, left, right, bottom WILL work.
-> Space remains reserved.

Example -->
<!DOCTYPE html>
<html>

<head>
    <style>
        .box {
            position: relative;
            left: 50px;
            top: 20px;
            background: lightgreen;
        }
    </style>
</head>

<body>

    <div class="box">Relative Box</div>

</body>

</html>

<!-- 📌 It shifts from original position but keeps its space.

position: absolute
Definition
-> Moves element relative to nearest positioned parent.
-> If no positioned parent, it uses body.
-> Space is NOT reserved.
Example -->
<!DOCTYPE html>
<html>

<head>
    <style>
        .parent {
            position: relative;
            height: 200px;
            border: 2px solid black;
        }

        .child {
            position: absolute;
            top: 20px;
            right: 20px;
            background: orange;
        }
    </style>
</head>

<body>

    <div class="parent">
        <div class="child">Absolute Box</div>
    </div>

</body>

</html>

<!-- 📌 It removes element from normal flow.

position: fixed
Definition
-> Element stays fixed on screen.
-> It does NOT move when scrolling.
Example -->
<!DOCTYPE html>
<html>

<head>
    <style>
        .box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: red;
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="box">Fixed Button</div>

    <p style="height:2000px;">Scroll down to see effect</p>

</body>

</html>

<!-- 📌 It stays at same position while scrolling.

position: sticky
Definition
-> Acts like relative until a scroll limit is reached.
-> Then it becomes fixed.
Example -->
<!DOCTYPE html>
<html>

<head>
    <style>
        .header {
            position: sticky;
            top: 0;
            background: yellow;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="header">Sticky Header</div>

    <p style="height:2000px;">
        Scroll down to see sticky effect.
    </p>

</body>

</html>
